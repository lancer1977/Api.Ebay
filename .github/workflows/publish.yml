name: publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "Api.Ebay.sln"

      - name: Pack
        run: dotnet pack "src/PolyhydraGames.API.Ebay/PolyhydraGames.API.Ebay.csproj" --configuration Release --no-restore -p:PackageVersion=1.0.0.16 -o ./artifacts

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-ebay-packages
          path: ./artifacts/*.nupkg
          if-no-files-found: error

      - name: Push to GitHub Packages
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
