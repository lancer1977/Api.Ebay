name: ci

on:
  push:
    branches: [main]
    paths:
      - "src/PolyhydraGames.API.Ebay/**"
      - "tests/PolyhydraGames.API.Ebay.Tests/**"
      - "Api.Ebay.sln"
      - "scripts/smoke.sh"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/PolyhydraGames.API.Ebay/**"
      - "tests/PolyhydraGames.API.Ebay.Tests/**"
      - "Api.Ebay.sln"
      - "scripts/smoke.sh"
      - ".github/workflows/ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Configure NuGet
        run: |
          cat > NuGet.Config <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="github" value="https://nuget.pkg.github.com/lancer1977/index.json" />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceCredentials>
              <github>
                <add key="Username" value="lancer1977" />
                <add key="ClearTextPassword" value="${GHCR_TOKEN}" />
              </github>
            </packageSourceCredentials>
          </configuration>
          EOF
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      - run: dotnet restore Api.Ebay.sln --configfile NuGet.Config
      - run: dotnet build Api.Ebay.sln --no-restore
      - run: dotnet test Api.Ebay.sln --no-restore --no-build --verbosity normal
      - run: bash scripts/smoke.sh --no-restore
      - run: dotnet pack src/PolyhydraGames.API.Ebay/PolyhydraGames.API.Ebay.csproj --configuration Release --no-restore --output ./artifacts -p:PackageVersion=${{ github.run_number }}

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-ebay-packages
          path: ./artifacts/*.nupkg
          if-no-files-found: error
