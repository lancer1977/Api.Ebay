# Starter pipeline
name: 1.0.0.$(rev:r)
variables: 
- name: Project.Path
  value: 'src/PolyhydraGames.API.Ebay/PolyhydraGames.API.Ebay.csproj'
- name: BuildConfiguration
  value: Release
trigger:
  branches:
    include:
    - refs/heads/main
  paths:
    include:
    - src/PolyhydraGames.API.Ebay
    - Api.Ebay.sln
    - build.yml

jobs:
- job: Phase_1 
  cancelTimeoutInMinutes: 1
  pool:
    name: Default
  steps:
  - checkout: self
  - task: DotNetCoreCLI@2
    inputs:
      command: 'restore'
      projects: '$(Project.Path)'
      feedsToUse: 'select'
      vstsFeed: '015fc12f-cd63-4ab4-8d6a-dc889e53bf70'
  - task: DotNetCoreCLI@2
    inputs:
      command: 'pack'
      projects: '$(Project.Path)'
      versioningScheme: 'byBuildNumber'
      arguments: '-c $(BuildConfiguration) --no-restore' 
  - task: DotNetCoreCLI@2
    inputs:
      command: 'push'
      packagesToPush: '$(Build.ArtifactStagingDirectory)/*.nupkg'
      nuGetFeedType: 'internal'
      publishVstsFeed: '015fc12f-cd63-4ab4-8d6a-dc889e53bf70'