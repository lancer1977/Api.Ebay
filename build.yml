name: 1.0.0.$(rev:r)
variables:
- name: Project.Path
  value: 'src/PolyhydraGames.API.Ebay/PolyhydraGames.API.Ebay.csproj'
- name: BuildConfiguration
  value: Release
trigger:
  branches:
    include:
    - refs/heads/main
  paths:
    include:
    - src/PolyhydraGames.API.Ebay
    - Api.Ebay.sln
    - build.yml

jobs:
- job: Phase_1
  cancelTimeoutInMinutes: 1
  pool:
    name: Default
  steps:
  - checkout: self
  - task: Bash@3
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        sed -i "s|%GITHUB_TOKEN%|$(NugetPat)|" NuGet.Config
        dotnet restore Api.Ebay.sln
  - task: Bash@3
    inputs:
      targetType: inline
      script: dotnet build Api.Ebay.sln --configuration $(BuildConfiguration) --no-restore
  - task: Bash@3
    inputs:
      targetType: inline
      script: dotnet test Api.Ebay.sln --configuration $(BuildConfiguration) --no-restore --no-build --verbosity normal
  - task: Bash@3
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        rm -rf "$(Build.ArtifactStagingDirectory)"/*.nupkg
        dotnet pack "$(Project.Path)" --configuration $(BuildConfiguration) --no-restore --output "$(Build.ArtifactStagingDirectory)"
  - task: Bash@3
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        for package in "$(Build.ArtifactStagingDirectory)"/*.nupkg; do
          dotnet nuget push "$package" \
            --source "https://nuget.pkg.github.com/lancer1977/index.json" \
            --api-key "$(NugetPat)" \
            --skip-duplicate
        done
